<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scripting Languages Quiz</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="quiz-container">
        <header>
            <h1>Scripting Quiz</h1>
        </header>

        <section id="start-screen" class="active">
            <h2>Student Details</h2>
            <div class="input-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>
            <div class="input-group">
                <label for="rollno">Roll Number</label>
                <input type="text" id="rollno" placeholder="Enter your roll number" required>
            </div>
            <div class="input-group">
                <label for="branch">Branch</label>
                <input type="text" id="branch" placeholder="Enter your branch" required>
            </div>
            <button id="start-btn">Start Quiz</button>
        </section>

        <div class="progress-bar hidden" id="progress-container">
            <div class="progress" id="progress"></div>
        </div>

        <main id="quiz" class="hidden">
            <h2 id="question">Question Text Here</h2>
            <div id="options" class="options-container">
            </div>
            <div class="feedback" id="feedback"></div>
            <button id="next-btn" class="hidden">Next Question</button>
        </main>

        <section id="results" class="hidden">
            <h2>Quiz Completed!</h2>
            <div class="student-info">
                <p><strong>Name:</strong> <span id="res-name"></span></p>
                <p><strong>Roll No:</strong> <span id="res-rollno"></span></p>
                <p><strong>Branch:</strong> <span id="res-branch"></span></p>
            </div>
            <p>Your Score: <span id="score">0</span> / <span id="total">0</span></p>
            <button id="restart-btn">Restart Quiz</button>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
