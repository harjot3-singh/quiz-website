<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="center-view">
        <div class="auth-container glass-panel">
            <div style="text-align: center; margin-bottom: 20px;">
                <i class="fa-solid fa-building-user logo-icon"></i>
            </div>
            <h2 style="text-align: center;">Hostel Login</h2>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn" style="margin-top: 10px;">Login</button>
                <div style="margin-top: 15px; text-align: center;">
                    <a href="hostel.html" style="font-size: 0.9rem;">Continue without login</a>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
